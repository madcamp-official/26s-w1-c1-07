# 로컬 개발용 MySQL (선택) — 팀원이 자기 PC에서 DB 띄울 때 사용.
# 배포(prod) DB는 KAIST VM 안에 직접 설치돼 있으며 이 compose 와 무관하다.
# 사용:  docker compose up -d   → 로컬 127.0.0.1:3307 에 MySQL 8
#        server/.env 의 DATABASE_URL 을 3307 로 바꿔 마이그레이션/시드
services:
  mysql:
    image: mysql:8.0
    container_name: madpump-mysql-dev
    environment:
      MYSQL_ROOT_PASSWORD: devroot
      MYSQL_DATABASE: madpump
      MYSQL_USER: madpump
      MYSQL_PASSWORD: devpass
      TZ: Asia/Seoul
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    ports:
      - "3307:3306"
    volumes:
      - madpump_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-pdevroot"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  madpump_mysql_data:
