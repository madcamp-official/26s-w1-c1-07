# Local dev MySQL (optional) — for teammates running a DB on their own PC.
# The production (prod) DB is installed directly inside the KAIST VM and is unrelated to this compose.
# Usage:  docker compose up -d   → MySQL 8 at local 127.0.0.1:3307
#         change DATABASE_URL in server/.env to 3307, then migrate/seed
services:
  mysql:
    image: mysql:8.0
    container_name: madpump-mysql-dev
    environment:
      MYSQL_ROOT_PASSWORD: devroot
      MYSQL_DATABASE: madpump
      MYSQL_USER: madpump
      MYSQL_PASSWORD: devpass
      TZ: Asia/Seoul
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    ports:
      - "3307:3306"
    volumes:
      - madpump_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-pdevroot"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  madpump_mysql_data:
